<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 340px; padding: 16px; font-family: -apple-system, sans-serif; margin: 0; color: #1e293b; background: #f8fafc; }
    h2 { font-size: 16px; font-weight: 600; margin: 0 0 16px 0; display: flex; align-items: center; gap: 8px; }
    .section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; color: #64748b; margin: 16px 0 8px 0; }
    .course-row { display: flex; items-center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #e2e8f0; }
    .course-id { font-family: monospace; font-weight: 600; font-size: 13px; }
    .toggle-group { display: flex; background: #e2e8f0; border-radius: 6px; padding: 2px; }
    .toggle-group button { border: none; background: transparent; padding: 4px 8px; font-size: 11px; cursor: pointer; border-radius: 4px; color: #64748b; font-weight: 500; }
    .toggle-group button.active { background: #ffffff; color: #3b82f6; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
    select { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #e2e8f0; font-size: 13px; background: white; }
    .empty-state { font-size: 12px; color: #94a3b8; text-align: center; margin: 20px 0; }
  </style>
</head>
<body>
  <h2>PriorityPing Settings</h2>
  
  <div class="section-label">Viewing History</div>
  <select id="time-window">
    <option value="today">Today Only</option>
    <option value="3days">Last 3 Days</option>
    <option value="7days">Last 7 Days</option>
    <option value="all">All Notifications</option>
  </select>

  <div class="section-label">Course Importance</div>
  <div id="course-settings"></div>

  <script src="popup.js"></script>
</body>
</html>
